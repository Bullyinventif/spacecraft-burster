<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spacecraft Burster</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020817;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden;user-select:none}
#hud{display:flex;gap:12px;padding:8px 16px;color:#fff;font-size:13px;letter-spacing:1px;z-index:10;flex-wrap:wrap;justify-content:center}
#hud span{background:rgba(255,255,255,0.07);border:1px solid rgba(125,211,252,0.2);padding:4px 12px;border-radius:20px}
#hud .val{color:#7dd3fc;font-weight:bold}
canvas{display:block;cursor:crosshair}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:20;background:rgba(2,8,23,0.85);backdrop-filter:blur(4px)}
#overlay.hidden{display:none}
.panel{background:rgba(2,8,23,0.97);border:1.5px solid rgba(125,211,252,0.35);border-radius:16px;padding:28px 36px;text-align:center;color:#fff;width:320px;box-shadow:0 0 40px rgba(125,211,252,0.1)}
.panel h1{font-size:20px;color:#7dd3fc;margin-bottom:6px;letter-spacing:3px;text-transform:uppercase}
.panel .sub{font-size:12px;color:#475569;margin-bottom:18px;line-height:1.6}
.panel .score-big{font-size:40px;color:#fbbf24;font-weight:bold;margin:8px 0;text-shadow:0 0 20px rgba(251,191,36,0.5)}
.btn{background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;border-radius:8px;padding:11px 28px;font-size:14px;font-family:'Courier New',monospace;cursor:pointer;letter-spacing:2px;margin-top:6px;transition:opacity 0.15s;width:100%}
.btn:hover{opacity:0.85}
.btn.secondary{background:rgba(255,255,255,0.07);border:1px solid rgba(125,211,252,0.3);margin-top:8px}
#leaderboard{margin-top:14px;text-align:left;width:100%}
#leaderboard h3{font-size:11px;color:#7dd3fc;letter-spacing:2px;margin-bottom:8px;text-align:center}
.lb-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;font-size:12px;margin-bottom:3px;background:rgba(255,255,255,0.04)}
.lb-row.gold{background:rgba(251,191,36,0.1);color:#fbbf24}
.lb-row.silver{color:#94a3b8}
.lb-row.bronze{color:#cd7c3c}
.lb-rank{width:20px;text-align:center;font-weight:bold}
.lb-name{flex:1;color:inherit}
.lb-score{color:#7dd3fc;font-weight:bold}
.lb-wave{font-size:10px;color:#475569}
.name-input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(125,211,252,0.3);border-radius:8px;padding:10px;color:#fff;font-family:'Courier New',monospace;font-size:14px;text-align:center;margin-bottom:8px;outline:none}
.name-input:focus{border-color:#7dd3fc}
.wave-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:26px;font-family:'Courier New',monospace;font-weight:bold;letter-spacing:4px;pointer-events:none;z-index:15;opacity:0;transition:opacity 0.4s;text-shadow:0 0 20px currentColor}
</style>
</head>
<body>
<div id="hud">
  <span>SCORE <span class="val" id="hScore">0</span></span>
  <span>VAGUE <span class="val" id="hWave">1</span></span>
  <span>VIE <span class="val" id="hLife">♥♥♥</span></span>
  <span style="cursor:pointer" onclick="showLB()">🏆 RECORDS</span>
</div>
<canvas id="c"></canvas>
<div class="wave-flash" id="wflash"></div>

<div id="overlay">
  <!-- START -->
  <div class="panel" id="startPanel">
    <h1>⚡ Spacecraft Burster</h1>
    <p class="sub">Pilote ton vaisseau et défends la galaxie contre les hordes des extraterstres.<br>Boss toutes les 5 vagues !</p>
    <button class="btn" onclick="startGame()">▶ JOUER</button>
    <div id="leaderboard"><h3>🏆 MEILLEURS SCORES</h3><div id="lbListStart"></div></div>
  </div>
  <!-- GAME OVER -->
  <div class="panel hidden" id="gameoverPanel">
    <h1>GAME OVER</h1>
    <p class="sub">T'as perdu…</p>
    <div class="score-big" id="goScore">0</div>
    <p style="color:#7dd3fc;font-size:11px;margin-bottom:14px">VAGUE ATTEINTE : <span id="goWave">1</span></p>
    <input class="name-input" id="nameInput" maxlength="12" placeholder="Ton pseudo (12 car. max)" />
    <button class="btn" id="saveBtn" onclick="saveScore()">💾 SAUVEGARDER MON SCORE</button>
    <button class="btn secondary" onclick="startGame()">↩ REJOUER</button>
    <div id="leaderboard" style="margin-top:16px"><h3>🏆 MEILLEURS SCORES</h3><div id="lbListGO"></div></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// 🔧 REMPLACE PAR TA CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "VOTRE_API_KEY",
  authDomain: "bubble-game-fa894.firebaseapp.com",
  projectId: "bubble-game-fa894",
  storageBucket: "bubble-game-fa894.appspot.com",
  messagingSenderId: "VOTRE_SENDER_ID",
  appId: "VOTRE_APP_ID"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window._fbSave = async (name, score, wave) => {
  try {
    await addDoc(collection(db, 'spacecraft-burster_scores'), {
      name: name.trim().toUpperCase() || 'ANONYME',
      score, wave,
      date: Date.now()
    });
    return true;
  } catch(e) { console.error(e); return false; }
};

window._fbLoad = async () => {
  try {
    const q = query(collection(db, 'spacecraft-burster_scores'), orderBy('score','desc'), limit(10));
    const snap = await getDocs(q);
    return snap.docs.map(d => d.data());
  } catch(e) { return []; }
};

// Load on start
loadLB();
</script>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = Math.min(window.innerWidth, 500);
  H = canvas.height = Math.min(window.innerHeight - 60, 680);
}
resize();
window.addEventListener('resize', resize);

// ---- Stars ----
const STARS = Array.from({length:120}, () => ({
  x: Math.random(), y: Math.random(),
  s: 0.5 + Math.random()*2, spd: 0.2 + Math.random()*0.8,
  b: 0.3 + Math.random()*0.7
}));

// ---- State ----
let score, wave, lives, bullets, enemies, particles, bossAlive;
let mx = 250, my = 300;
let shootCD = 0, spawnTimer = 0, waveEnemyCount, waveSpawned;
let animId, gameRunning = false;
let flashTimer = 0, flashColor = '#fbbf24', flashText = '';
let shipFlash = 0;
let thrusterAnim = 0;

const SX = () => mx;
const SY = () => H - 54;
const SR = 16;

const ETYPES = [
  { name:'Extraterstre',    color:'#ef4444', size:20, hp:3, spd:1.1, pts:30, shape:'robot'   },
  { name:'Origamin', color:'#a855f7', size:16, hp:2, spd:1.9, pts:20, shape:'diamond' },
  { name:'Adam',     color:'#f97316', size:14, hp:1, spd:2.5, pts:10, shape:'orb'     },
  { name:'Carrin',   color:'#ec4899', size:18, hp:2, spd:1.5, pts:25, shape:'square'  },
  { name:'Ombre',    color:'#6366f1', size:22, hp:4, spd:1.0, pts:40, shape:'shadow'  },
];
const BOSS_DEF = { name:'SPACECRAFT PRIME', color:'#dc2626', size:38, hp:40, spd:0.65, pts:300, shape:'boss' };

function enemiesForWave(w) { return 6 + w * 3; }
function isBossWave(w) { return w % 5 === 0; }

// ---- Game flow ----
function startGame() {
  score=0; wave=1; lives=3;
  bullets=[]; enemies=[]; particles=[];
  bossAlive=false; shootCD=0; spawnTimer=0;
  waveEnemyCount = enemiesForWave(1);
  waveSpawned=0; gameRunning=true;
  mx = W/2; my = H/2;
  document.getElementById('overlay').classList.add('hidden');
  flashWave('VAGUE 1', '#7dd3fc');
  if (animId) cancelAnimationFrame(animId);
  loop();
}

async function saveScore() {
  const name = document.getElementById('nameInput').value || 'ANONYME';
  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳ Sauvegarde…';
  btn.disabled = true;
  if (window._fbSave) await window._fbSave(name, score, wave);
  btn.textContent = '✅ Score sauvegardé !';
  loadLB();
}

async function loadLB() {
  if (!window._fbLoad) return;
  const rows = await window._fbLoad();
  ['lbListStart','lbListGO'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (!rows.length) { el.innerHTML = '<div style="color:#475569;font-size:11px;text-align:center;padding:8px">Aucun score encore…</div>'; return; }
    const medals = ['🥇','🥈','🥉'];
    const cls = ['gold','silver','bronze'];
    el.innerHTML = rows.map((r,i) =>
      `<div class="lb-row ${cls[i]||''}">
        <span class="lb-rank">${medals[i]||i+1}</span>
        <span class="lb-name">${r.name}</span>
        <span class="lb-score">${r.score.toLocaleString()}</span>
        <span class="lb-wave">vague ${r.wave}</span>
      </div>`
    ).join('');
  });
}
window.loadLB = loadLB;

function showLB() {
  if (!gameRunning) return;
  gameRunning = false;
  document.getElementById('startPanel').classList.remove('hidden');
  document.getElementById('gameoverPanel').classList.add('hidden');
  document.getElementById('overlay').classList.remove('hidden');
  loadLB();
}

function gameOver() {
  gameRunning = false;
  document.getElementById('goScore').textContent = score.toLocaleString();
  document.getElementById('goWave').textContent = wave;
  document.getElementById('saveBtn').textContent = '💾 SAUVEGARDER MON SCORE';
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('nameInput').value = '';
  document.getElementById('gameoverPanel').classList.remove('hidden');
  document.getElementById('startPanel').classList.add('hidden');
  document.getElementById('overlay').classList.remove('hidden');
  loadLB();
}

// ---- Flash ----
function flashWave(txt, col) {
  flashText = txt; flashColor = col;
  const el = document.getElementById('wflash');
  el.textContent = txt; el.style.color = col; el.style.opacity = 1;
  flashTimer = 100;
}

// ---- Spawn ----
function spawnEnemy() {
  const isBoss = isBossWave(wave) && waveEnemyCount === 1 && !bossAlive;
  let def = isBoss ? {...BOSS_DEF} : {...ETYPES[Math.floor(Math.random() * Math.min(ETYPES.length, 1 + Math.floor(wave/2)))]};
  def.hp += Math.floor(wave/3);
  def.maxHp = def.hp;
  def.spd = (def.spd || 1) + wave * 0.04;
  def.x = def.size*1.5 + Math.random()*(W - def.size*3);
  def.y = -def.size;
  def.angle = 0; def.wobble = Math.random()*Math.PI*2;
  if (isBoss) bossAlive = true;
  enemies.push(def);
  waveSpawned++;
}

// ---- Particles ----
function burst(x, y, color, n, big) {
  for (let i = 0; i < n; i++) {
    const a = Math.random()*Math.PI*2;
    const s = (big?3:1.5) + Math.random()*(big?6:3);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:big?50:30,maxLife:big?50:30,color,r:big?4:2.5});
  }
}
function spark(x,y) {
  for (let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({x,y,vx:Math.cos(a)*(1+Math.random()*4),vy:Math.sin(a)*(1+Math.random()*4),life:18,maxLife:18,color:'#7dd3fc',r:2});
  }
}

// ---- Draw ----
function drawBg() {
  ctx.fillStyle='#020817'; ctx.fillRect(0,0,W,H);
  // nebula glow
  const ng = ctx.createRadialGradient(W*0.7,H*0.2,10,W*0.7,H*0.2,200);
  ng.addColorStop(0,'rgba(99,102,241,0.06)'); ng.addColorStop(1,'transparent');
  ctx.fillStyle=ng; ctx.fillRect(0,0,W,H);
  const ng2 = ctx.createRadialGradient(W*0.2,H*0.6,10,W*0.2,H*0.6,150);
  ng2.addColorStop(0,'rgba(59,130,246,0.05)'); ng2.addColorStop(1,'transparent');
  ctx.fillStyle=ng2; ctx.fillRect(0,0,W,H);
  // stars
  STARS.forEach(s => {
    s.y += s.spd * 0.003;
    if (s.y > 1) s.y = 0;
    const alpha = s.b * (0.6+0.4*Math.sin(Date.now()*0.002+s.x*10));
    ctx.fillStyle=`rgba(200,220,255,${alpha})`;
    ctx.fillRect(s.x*W, s.y*H, s.s, s.s);
  });
}

function drawShip(x, y) {
  thrusterAnim++;
  ctx.save(); ctx.translate(x, y);

  // thruster flame
  const flameH = 14 + Math.sin(thrusterAnim*0.4)*4;
  const fg = ctx.createLinearGradient(0, 8, 0, 8+flameH);
  fg.addColorStop(0,'rgba(59,130,246,0.9)'); fg.addColorStop(0.5,'rgba(251,191,36,0.7)'); fg.addColorStop(1,'transparent');
  ctx.fillStyle=fg;
  ctx.beginPath(); ctx.moveTo(-7,8); ctx.lineTo(7,8); ctx.lineTo(3,8+flameH); ctx.lineTo(-3,8+flameH); ctx.closePath(); ctx.fill();
  // side flames
  const sf = 8+Math.sin(thrusterAnim*0.5)*3;
  ctx.fillStyle='rgba(99,102,241,0.6)';
  ctx.beginPath(); ctx.moveTo(-12,4); ctx.lineTo(-8,4); ctx.lineTo(-10,4+sf); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(12,4); ctx.lineTo(8,4); ctx.lineTo(10,4+sf); ctx.closePath(); ctx.fill();

  if (shipFlash > 0) { ctx.globalAlpha = 0.5 + Math.sin(shipFlash*0.8)*0.5; shipFlash--; }

  // hull body
  ctx.fillStyle='#1e3a8a';
  ctx.beginPath(); ctx.moveTo(0,-SR); ctx.lineTo(12,8); ctx.lineTo(8,12); ctx.lineTo(-8,12); ctx.lineTo(-12,8); ctx.closePath(); ctx.fill();
  // hull highlight
  ctx.fillStyle='#2563eb';
  ctx.beginPath(); ctx.moveTo(0,-SR); ctx.lineTo(7,4); ctx.lineTo(0,8); ctx.lineTo(-7,4); ctx.closePath(); ctx.fill();
  // cockpit
  const cg = ctx.createRadialGradient(0,-4,1,0,-4,7);
  cg.addColorStop(0,'#7dd3fc'); cg.addColorStop(1,'#3b82f6');
  ctx.fillStyle=cg;
  ctx.beginPath(); ctx.ellipse(0,-4,6,7,0,0,Math.PI*2); ctx.fill();
  // wings
  ctx.fillStyle='#1d4ed8';
  ctx.beginPath(); ctx.moveTo(-12,8); ctx.lineTo(-20,14); ctx.lineTo(-14,14); ctx.lineTo(-8,10); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(12,8); ctx.lineTo(20,14); ctx.lineTo(14,14); ctx.lineTo(8,10); ctx.closePath(); ctx.fill();
  // wing accent
  ctx.fillStyle='#7dd3fc';
  ctx.beginPath(); ctx.moveTo(-18,13); ctx.lineTo(-14,13); ctx.lineTo(-13,14); ctx.lineTo(-19,14); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(18,13); ctx.lineTo(14,13); ctx.lineTo(13,14); ctx.lineTo(19,14); ctx.closePath(); ctx.fill();
  // cannon
  ctx.fillStyle='#93c5fd';
  ctx.fillRect(-2,-SR-4,4,8); ctx.beginPath(); ctx.arc(0,-SR-4,3,0,Math.PI*2); ctx.fill();

  // aim dot trail
  ctx.globalAlpha=1;
  const dx=mx-x, dy=my-y, dist=Math.sqrt(dx*dx+dy*dy)||1;
  for(let i=1;i<=4;i++){
    ctx.fillStyle=`rgba(125,211,252,${0.15-i*0.03})`;
    ctx.beginPath(); ctx.arc(x+dx/dist*(i*14)-x, dy/dist*(i*14)-y+y-y, 3-i*0.4, 0, Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.shadowColor='#7dd3fc'; ctx.shadowBlur=12;
  const g = ctx.createLinearGradient(b.x,b.y-8,b.x,b.y+2);
  g.addColorStop(0,'#fff'); g.addColorStop(0.3,'#7dd3fc'); g.addColorStop(1,'transparent');
  ctx.fillStyle=g;
  ctx.beginPath(); ctx.ellipse(b.x,b.y,3,8,0,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0; ctx.restore();
}

function drawEnemy(e) {
  ctx.save(); ctx.translate(e.x, e.y);
  e.wobble += 0.04;
  const bobY = Math.sin(e.wobble)*2;
  ctx.translate(0, bobY);

  if (e.shape==='boss') {
    // outer ring
    ctx.strokeStyle='rgba(239,68,68,0.4)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,e.size+10,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='rgba(239,68,68,0.15)'; ctx.lineWidth=8;
    ctx.beginPath(); ctx.arc(0,0,e.size+18,0,Math.PI*2); ctx.stroke();
    // spikes
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2+e.angle;
      ctx.save(); ctx.rotate(a);
      const sg=ctx.createLinearGradient(e.size,0,e.size+18,0);
      sg.addColorStop(0,'#ef4444'); sg.addColorStop(1,'transparent');
      ctx.fillStyle=sg;
      ctx.beginPath(); ctx.moveTo(e.size,0); ctx.lineTo(e.size+18,-6); ctx.lineTo(e.size+18,6); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    e.angle+=0.025;
    const bg=ctx.createRadialGradient(0,0,2,0,0,e.size);
    bg.addColorStop(0,'#7f1d1d'); bg.addColorStop(1,'#dc2626');
    ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(0,0,e.size,0,Math.PI*2); ctx.fill();
    // eyes
    ctx.fillStyle='#fef2f2'; [-10,10].forEach(ex=>{ctx.beginPath();ctx.ellipse(ex,-6,7,8,0,0,Math.PI*2);ctx.fill();});
    ctx.fillStyle='#1c1917'; [-10,10].forEach(ex=>{ctx.beginPath();ctx.arc(ex,-5,4,0,Math.PI*2);ctx.fill();});
    ctx.fillStyle='#fff'; [-8,12].forEach(ex=>{ctx.beginPath();ctx.arc(ex,-7,1.5,0,Math.PI*2);ctx.fill();});
    // angry brow
    ctx.strokeStyle='#7f1d1d'; ctx.lineWidth=3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-17,-14); ctx.lineTo(-4,-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(17,-14); ctx.lineTo(4,-10); ctx.stroke();
    // mouth
    ctx.strokeStyle='#7f1d1d'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-8,8); ctx.lineTo(-4,12); ctx.lineTo(4,12); ctx.lineTo(8,8); ctx.stroke();
    // hp bar
    const bw=e.size*2.8;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(-bw/2,e.size+8,bw,7);
    ctx.fillStyle='#ef4444'; ctx.fillRect(-bw/2,e.size+8,bw*(e.hp/e.maxHp),7);
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1; ctx.strokeRect(-bw/2,e.size+8,bw,7);
  } else if(e.shape==='robot'){
    ctx.fillStyle=e.color; ctx.fillRect(-e.size,-e.size,e.size*2,e.size*2);
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(-e.size+3,-e.size+3,e.size*2-6,e.size*2-6);
    ctx.fillStyle='#fef2f2'; ctx.fillRect(-8,-8,6,8); ctx.fillRect(2,-8,6,8);
    ctx.fillStyle='#1c1917'; ctx.fillRect(-7,-7,4,6); ctx.fillRect(3,-7,4,6);
    ctx.fillStyle='rgba(239,68,68,0.8)'; ctx.fillRect(-5,2,10,4);
    ctx.fillStyle='#999'; ctx.fillRect(-3,e.size-5,6,4);
  } else if(e.shape==='diamond'){
    const dg=ctx.createLinearGradient(0,-e.size,0,e.size);
    dg.addColorStop(0,'#f3e8ff'); dg.addColorStop(0.5,e.color); dg.addColorStop(1,'#581c87');
    ctx.fillStyle=dg;
    ctx.beginPath(); ctx.moveTo(0,-e.size); ctx.lineTo(e.size,0); ctx.lineTo(0,e.size); ctx.lineTo(-e.size,0); ctx.closePath(); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.moveTo(0,-e.size*0.6); ctx.lineTo(e.size*0.5,0); ctx.lineTo(0,-e.size*0.1); ctx.closePath(); ctx.fill();
  } else if(e.shape==='square'){
    ctx.fillStyle=e.color; ctx.beginPath(); ctx.roundRect(-e.size,-e.size,e.size*2,e.size*2,4); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(-e.size+4,-e.size+4,e.size-4,e.size-4);
    ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1; ctx.beginPath(); ctx.roundRect(-e.size,-e.size,e.size*2,e.size*2,4); ctx.stroke();
  } else if(e.shape==='shadow'){
    ctx.shadowColor=e.color; ctx.shadowBlur=20;
    ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(0,0,e.size,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.beginPath(); ctx.arc(0,0,e.size*0.7,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(99,102,241,0.8)'; [-8,8].forEach(ex=>{ctx.beginPath();ctx.arc(ex,-4,4,0,Math.PI*2);ctx.fill();});
  } else {
    const og=ctx.createRadialGradient(0,0,1,0,0,e.size);
    og.addColorStop(0,'#fff7ed'); og.addColorStop(1,e.color);
    ctx.fillStyle=og; ctx.beginPath(); ctx.arc(0,0,e.size,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.beginPath(); ctx.arc(-e.size*0.3,-e.size*0.3,e.size*0.4,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawParticle(p) {
  ctx.globalAlpha = p.life/p.maxLife;
  ctx.shadowColor=p.color; ctx.shadowBlur=6;
  ctx.fillStyle=p.color;
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r*(p.life/p.maxLife),0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function draw() {
  drawBg();
  particles.forEach(drawParticle);
  bullets.forEach(drawBullet);
  enemies.forEach(drawEnemy);
  drawShip(SX(), SY());
}

// ---- Update ----
function update() {
  const sx=SX(), sy=SY();

  // auto-shoot
  if(--shootCD<=0){ shoot(); shootCD=14; }

  // spawn
  const rate=Math.max(25,85-wave*5);
  if(++spawnTimer>=rate && waveSpawned<waveEnemyCount){ spawnEnemy(); spawnTimer=0; }

  // bullets
  bullets=bullets.filter(b=>{ b.x+=b.vx; b.y+=b.vy; return b.y>-10&&b.y<H+10&&b.x>0&&b.x<W; });

  // enemies
  let allDone=waveSpawned>=waveEnemyCount;
  enemies=enemies.filter(e=>{
    const dx=sx-e.x, dy=sy-e.y, d=Math.sqrt(dx*dx+dy*dy)||1;
    e.x+=dx/d*e.spd; e.y+=dy/d*e.spd;

    // hit ship
    if(d<SR+e.size-4){
      burst(e.x,e.y,e.color,14,true);
      lives--; shipFlash=30; updateHUD();
      if(lives<=0){ gameOver(); return false; }
      return false;
    }

    // bullet collision
    bullets=bullets.filter(b=>{
      const bdx=b.x-e.x,bdy=b.y-e.y;
      if(Math.sqrt(bdx*bdx+bdy*bdy)<e.size+5){
        e.hp--; spark(b.x,b.y); return false;
      }
      return true;
    });

    if(e.hp<=0){
      burst(e.x,e.y,e.color,20,true);
      score+=e.pts*wave; updateHUD();
      if(e.shape==='boss') bossAlive=false;
      return false;
    }
    if(e.shape!=='boss') allDone=false;
    return true;
  });

  if(enemies.length===0&&!bossAlive&&waveSpawned>=waveEnemyCount){
    wave++; waveEnemyCount=isBossWave(wave)?1:enemiesForWave(wave);
    waveSpawned=0; spawnTimer=0; updateHUD();
    flashWave(isBossWave(wave)?'⚠ BOSS WAVE '+wave:'— VAGUE '+wave+' —', isBossWave(wave)?'#ef4444':'#7dd3fc');
  }

  particles=particles.filter(p=>{ p.x+=p.vx; p.y+=p.vy; p.vx*=0.9; p.vy*=0.9; p.life--; return p.life>0; });

  if(flashTimer>0){
    flashTimer--;
    if(flashTimer<=30) document.getElementById('wflash').style.opacity=flashTimer/30;
  }
}

function shoot() {
  const sx=SX(), sy=SY();
  const dx=mx-sx, dy=my-sy, d=Math.sqrt(dx*dx+dy*dy)||1;
  const spd=12;
  bullets.push({x:sx,y:sy-SR,vx:dx/d*spd,vy:dy/d*spd});
}

function updateHUD() {
  document.getElementById('hScore').textContent=score.toLocaleString();
  document.getElementById('hWave').textContent=wave;
  document.getElementById('hLife').textContent='♥'.repeat(Math.max(0,lives));
}

function loop() {
  if(!gameRunning) return;
  update(); draw();
  animId=requestAnimationFrame(loop);
}

// Controls
canvas.addEventListener('mousemove',e=>{ const r=canvas.getBoundingClientRect(); mx=e.clientX-r.left; my=e.clientY-r.top; });
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect(); mx=e.touches[0].clientX-r.left; my=e.touches[0].clientY-r.top; },{passive:false});
canvas.addEventListener('touchstart',e=>{ const r=canvas.getBoundingClientRect(); mx=e.touches[0].clientX-r.left; my=e.touches[0].clientY-r.top; });
</script>
